apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: dkef-frontend
  labels:
    app: dkef-frontend
spec:
  ingressClassName: nginx
  rules:
    - http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: dkef-frontend
                port:
                  number: 80
