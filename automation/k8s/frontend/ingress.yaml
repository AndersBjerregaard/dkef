apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: dkef-frontend
  labels:
    app: dkef-frontend
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - andersbjerregaard.com
      secretName: dkef-frontend-tls
  rules:
    - host: andersbjerregaard.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: dkef-frontend
                port:
                  number: 80
