# Exposes Postgres on NodePort 30432, which KinD maps to host port 5432.
# This allows LAN-connected machines to reach the database via <host-ip>:5432
# (e.g. for pgAdmin on a developer's control machine).
# The WAF only exposes ports 80 and 443 externally, so this port is LAN-only by design.
apiVersion: v1
kind: Service
metadata:
  name: postgres-nodeport
  labels:
    app: postgres
spec:
  type: NodePort
  selector:
    app: postgres
  ports:
    - port: 5432
      targetPort: 5432
      nodePort: 30432
