- name: Check installed mc version
  ansible.builtin.command:
    cmd: "{{ mc_install_path }} --version"
  register: mc_current_version
  failed_when: false
  changed_when: false
  become: true

- name: Install mc binary on host
  ansible.builtin.get_url:
    url: "https://dl.min.io/client/mc/release/linux-{{ 'arm64' if ansible_architecture == 'aarch64' else 'amd64' }}/archive/mc.{{ mc_version }}"
    dest: "{{ mc_install_path }}"
    mode: "0755"
    owner: root
    group: root
  become: true
  when: >
    mc_current_version.rc != 0 or
    mc_version not in mc_current_version.stdout

- name: Ensure MinIO backup directory exists on host
  ansible.builtin.file:
    path: "{{ minio_backup_dir }}"
    state: directory
    mode: "0750"
    owner: root
    group: root
  become: true

- name: Configure mc alias for local MinIO
  ansible.builtin.command:
    cmd: >
      {{ mc_install_path }} alias set {{ mc_alias }}
      http://localhost:{{ minio_host_port }}
      {{ minio_access_key }}
      {{ minio_secret_key }}
  no_log: true
  become: true

- name: Mirror all MinIO buckets to host
  ansible.builtin.command:
    cmd: >
      {{ mc_install_path }} mirror --overwrite
      {{ mc_alias }}/
      {{ minio_backup_dir }}/
  become: true

- name: Remove mc alias
  ansible.builtin.command:
    cmd: "{{ mc_install_path }} alias rm {{ mc_alias }}"
  become: true

- name: Report backup location
  ansible.builtin.debug:
    msg: "MinIO backup written to {{ minio_backup_dir }}"
