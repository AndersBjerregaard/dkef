# ─── Step 1: Add the Jetstack Helm repository ────────────────────────────────
- name: Add Jetstack Helm repository
  kubernetes.core.helm_repository:
    name: jetstack
    repo_url: https://charts.jetstack.io
    state: present

# ─── Step 2: Install cert-manager via Helm ───────────────────────────────────
- name: Install cert-manager
  kubernetes.core.helm:
    name: cert-manager
    chart_ref: jetstack/cert-manager
    chart_version: "{{ cert_manager_version }}"
    release_namespace: "{{ cert_manager_namespace }}"
    create_namespace: true
    set_values:
      - value: crds.enabled=true
    state: present

# ─── Step 3: Wait for cert-manager deployments to be ready ───────────────────
- name: Wait for cert-manager webhook deployment to be ready
  ansible.builtin.command: >
    kubectl rollout status deployment/cert-manager-webhook
    -n {{ cert_manager_namespace }}
    --timeout=120s
  changed_when: false

- name: Wait for cert-manager controller deployment to be ready
  ansible.builtin.command: >
    kubectl rollout status deployment/cert-manager
    -n {{ cert_manager_namespace }}
    --timeout=120s
  changed_when: false

# ─── Step 4: Apply the Let's Encrypt ClusterIssuer ───────────────────────────
- name: Apply Let's Encrypt ClusterIssuer
  kubernetes.core.k8s:
    state: present
    definition: "{{ lookup('file', playbook_dir + '/../k8s/cert-manager/cluster-issuer.yaml') | from_yaml }}"
