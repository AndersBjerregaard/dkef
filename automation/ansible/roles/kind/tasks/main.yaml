- name: Check installed kind version
  ansible.builtin.command: kind --version
  register: kind_installed_version
  changed_when: false
  failed_when: false

- name: Set kind needs install fact
  ansible.builtin.set_fact:
    kind_needs_install: >-
      {{
        kind_installed_version.rc != 0 or
        kind_version not in kind_installed_version.stdout
      }}

- name: Set kind download URL based on architecture
  ansible.builtin.set_fact:
    kind_download_url: >-
      https://kind.sigs.k8s.io/dl/{{ kind_version }}/kind-linux-{{
      'arm64' if ansible_architecture == 'aarch64' else 'amd64'
      }}

- name: Download kind executable (if not installed or version mismatch)
  ansible.builtin.get_url:
    url: "{{ kind_download_url }}"
    dest: /tmp/kind
    mode: '0755'
    force: yes
  when: kind_needs_install
  become: yes

- name: Install kind to /usr/local/bin (if not installed or version mismatch)
  ansible.builtin.copy:
    src: /tmp/kind
    dest: /usr/local/bin/kind
    owner: root
    group: root
    mode: '0755'
    remote_src: yes
  when: kind_needs_install
  notify: Clean up downloaded kind file
  become: yes

- name: Verify kind installation
  ansible.builtin.command: kind --version
  register: kind_version_check
  changed_when: false

- name: Display kind version
  ansible.builtin.debug:
    msg: "{{ kind_version_check.stdout }}"
