# ─── Step 1: Resolve the current image digest for 'latest' ───────────────────
- name: Get frontend image digest from Docker Hub
  ansible.builtin.uri:
    url: "https://hub.docker.com/v2/repositories/anders97/dkef-frontend/tags/latest"
    method: GET
    return_content: true
    status_code: 200
  register: dockerhub_tag_info

- name: Extract image digest
  ansible.builtin.set_fact:
    frontend_image_digest: "{{ dockerhub_tag_info.json.digest }}"

- name: Show resolved image digest
  ansible.builtin.debug:
    msg: "Deploying anders97/dkef-frontend@{{ frontend_image_digest }}"

# ─── Step 2: Apply manifests with pinned digest ───────────────────────────────
- name: Apply Frontend Deployment
  kubernetes.core.k8s:
    state: present
    namespace: "{{ frontend_namespace }}"
    definition: "{{ lookup('file', playbook_dir + '/../k8s/frontend/deployment.yaml') | from_yaml | combine({'spec': {'template': {'spec': {'containers': [{'name': 'dkef-frontend', 'image': 'anders97/dkef-frontend@' + frontend_image_digest}]}}}}, recursive=true) }}"

- name: Apply Frontend ClusterIP service
  kubernetes.core.k8s:
    state: present
    namespace: "{{ frontend_namespace }}"
    definition: "{{ lookup('file', playbook_dir + '/../k8s/frontend/service.yaml') | from_yaml }}"

- name: Apply Frontend Ingress
  kubernetes.core.k8s:
    state: present
    namespace: "{{ frontend_namespace }}"
    definition: "{{ lookup('file', playbook_dir + '/../k8s/frontend/ingress.yaml') | from_yaml }}"

- name: Wait for Frontend Deployment to be ready
  kubernetes.core.k8s_info:
    kind: Deployment
    name: dkef-frontend
    namespace: "{{ frontend_namespace }}"
  register: frontend_deployment
  until: >
    frontend_deployment.resources | length > 0 and
    frontend_deployment.resources[0].status.readyReplicas is defined and
    frontend_deployment.resources[0].status.readyReplicas == 1
  retries: 24
  delay: 5
