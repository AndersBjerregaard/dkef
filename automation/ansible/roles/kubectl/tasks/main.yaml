- name: Check installed kubectl version
  ansible.builtin.command: kubectl version --client --output=json
  register: kubectl_installed_version
  changed_when: false
  failed_when: false

- name: Set kubectl needs install fact
  ansible.builtin.set_fact:
    kubectl_needs_install: >-
      {{
        kubectl_installed_version.rc != 0 or
        kubectl_version not in kubectl_installed_version.stdout
      }}

- name: Set kubectl download URL based on architecture
  ansible.builtin.set_fact:
    kubectl_download_url: >-
      https://dl.k8s.io/release/{{ kubectl_version }}/bin/linux/{{ 'arm64' if ansible_architecture == 'aarch64' else 'amd64' }}/kubectl

- name: Download kubectl executable (if not installed or version mismatch)
  ansible.builtin.get_url:
    url: "{{ kubectl_download_url }}"
    dest: /tmp/kubectl
    mode: '0755'
    force: yes
  become: yes
  when: kubectl_needs_install

- name: Install kubectl binary to /usr/local/bin (if not installed or version mismatch)
  ansible.builtin.command: install -o root -g root -m 0755 /tmp/kubectl /usr/local/bin/kubectl
  become: yes
  when: kubectl_needs_install
  notify: Clean up downloaded kubectl file

- name: Verify kubectl installation
  ansible.builtin.command: kubectl version --client
  register: kubectl_version_check
  changed_when: false

- name: Display kubectl version
  ansible.builtin.debug:
    msg: "{{ kubectl_version_check.stdout }}"
